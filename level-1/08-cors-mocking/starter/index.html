<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CORS Lab Client — LexLabs</title>
  <style>
    body {
      background: #080b11;
      color: #f1f5f9;
      font-family: ui-sans-serif, system-ui, sans-serif;
      max-width: 500px;
      margin: 4rem auto;
      padding: 1.5rem;
      border: 1px solid #1e293b;
      border-radius: 8px;
    }
    button {
      background: #2dd4bf;
      color: #04221c;
      border: none;
      padding: 0.6rem 1.2rem;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s ease;
    }
    button:hover { background: #14b8a6; }
    pre {
      background: #0d131f;
      padding: 1rem;
      border-radius: 4px;
      border: 1px solid #1e293b;
      font-family: monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .status {
      font-weight: 700;
      margin-top: 1rem;
      padding: 0.5rem;
      border-radius: 4px;
      text-align: center;
    }
    .status-idle { background: #1e293b; color: #94a3b8; }
    .status-success { background: #064e3b; color: #34d399; }
    .status-error { background: #7f1d1d; color: #f87171; }
  </style>
</head>
<body>

  <h2>🧪 CORS Lab Client</h2>
  <p style="color:#94a3b8; font-size:0.88rem; margin-bottom:1.5rem;">
    This dashboard client attempts to fetch weather from <code>http://localhost:5000/weather</code>. 
    If the backend server doesn't provide CORS headers, the web browser will throw a network exception!
  </p>

  <button id="fetch-btn">Fetch Weather Data</button>

  <div id="status-box" class="status status-idle">Ready to transmit requests</div>

  <h3 style="margin-top:1.5rem;">Response Output</h3>
  <pre id="output-box">[ No data fetched yet ]</pre>

  <script>
    document.getElementById('fetch-btn').addEventListener('click', async () => {
      const statusBox = document.getElementById('status-box');
      const outputBox = document.getElementById('output-box');

      statusBox.className = 'status status-idle';
      statusBox.textContent = 'Fetching data...';
      outputBox.textContent = 'Transmitting HTTP packet...';

      try {
        // TODO: Call the backend server endpoint http://localhost:5000/weather
        const response = await fetch('http://localhost:5000/weather');
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        statusBox.className = 'status status-success';
        statusBox.textContent = '✓ Fetch Succeeded!';
        outputBox.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        statusBox.className = 'status status-error';
        statusBox.textContent = '✗ Fetch Blocked!';
        outputBox.innerHTML = `<span style="color:#f87171; font-weight:bold;">Network Error!</span>\n` +
          `The request was blocked by the browser. Open your browser DevTools Console (F12) to inspect the CORS exception:\n\n` +
          `${err.message}`;
      }
    });
  </script>
</body>
</html>
